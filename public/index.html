<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Feedback Form</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Cinematic Curtain Opening Overlay -->
    <div class="curtain-container" id="curtainContainer">
        <div class="curtain curtain-left"></div>
        <div class="curtain curtain-right"></div>
    </div>

    <!-- Static Stage Background -->
    <div class="stage-background">
        <div class="stage-floor"></div>
        <div class="curtain-top"></div>
        <div class="curtain-side curtain-left-bg"></div>
        <div class="curtain-side curtain-right-bg"></div>
    </div>

    <!-- Main Content -->
    <div class="main-container" id="mainContainer">
        <div class="content-grid">
            <!-- Left Side: Admission Form Box -->
            <div class="left-pane">
                <header class="header">
                    <div class="logo-container">
                        <img src="assets/DSVV_LOGO_PNG.png" alt="DSVV Logo" class="logo-img">
                    </div>
                </header>

                <main class="form-wrapper glass-panel">
                    <div class="form-header">
                        <h2>Alumni Feedback Form</h2>
                        <p>Please fill out the details carefully.</p>
                    </div>

                    <form id="alumniForm">
                        <!-- Row 1 -->
                        <div class="form-row triplet">
                            <div class="form-group floating-label-group">
                                <input type="text" id="name" name="name" required placeholder=" " />
                                <label for="name">Name</label>
                            </div>
                            <div class="form-group floating-label-group">
                                <input type="text" id="designation" name="designation" required placeholder=" " />
                                <label for="designation">Designation</label>
                            </div>
                            <div class="form-group floating-label-group">
                                <input type="text" id="organisation" name="organisation" required placeholder=" " />
                                <label for="organisation">Organisation</label>
                            </div>
                        </div>

                        <!-- Row 2 -->
                        <div class="form-row triplet">
                            <div class="form-group floating-label-group">
                                <input type="email" id="email" name="email" required placeholder=" " />
                                <label for="email">Email</label>
                            </div>
                            <div class="form-group floating-label-group">
                                <input type="tel" id="whatsapp" name="whatsapp" required pattern="[0-9]{10}" title="Please enter exactly 10 digits" placeholder=" " />
                                <label for="whatsapp">Whatsapp Number</label>
                            </div>
                            <div class="form-group floating-label-group">
                                <input type="text" id="location" name="location" required placeholder=" " />
                                <label for="location">Current Location</label>
                            </div>
                        </div>

                        <!-- Emoji Section -->
                        <div class="emoji-section">
                            <p class="emoji-title">How was your experience?</p>
                            <div class="emoji-container" id="emojiContainer">
                                <button type="button" class="emoji-btn" data-value="Very Happy" data-emoji="😄">😄</button>
                                <button type="button" class="emoji-btn" data-value="Happy" data-emoji="🙂">🙂</button>
                                <button type="button" class="emoji-btn" data-value="Average" data-emoji="😐">😐</button>
                                <button type="button" class="emoji-btn" data-value="Sad" data-emoji="😕">😕</button>
                                <button type="button" class="emoji-btn" data-value="Very Sad" data-emoji="😣">😣</button>
                            </div>
                            <input type="hidden" id="emojiValue" name="emoji" required>
                        </div>

                        <!-- Message Section -->
                        <div id="feedbackMessageSection" class="form-row full-width hidden">
                            <div class="form-group floating-label-group">
                                <textarea id="message" name="message" rows="3" placeholder=" "></textarea>
                                <label for="message" id="messageLabel">Message</label>
                            </div>
                        </div>

                        <button type="submit" class="submit-btn hidden" id="submitBtn">
                            Submit Feedback
                        </button>
                    </form>
                    <div id="statusMessage" class="status-msg hidden"></div>
                </main>
            </div>

            <!-- Right Side: QR Code & Contact Section -->
            <div class="right-pane">


                <div class="contact-info-section glass-panel">
                    <h3
                        style="color: white; font-family: 'Montserrat', sans-serif; margin-bottom: 20px; font-size: 1.4rem;">
                        Contact Us</h3>
                    <div class="contact-item"
                        style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; color: #e6edf4; font-size: 1.05rem;">
                        <span class="icon" style="font-size: 1.3rem;">✉️</span> dsvv.ac.in
                    </div>
                    <div class="contact-item"
                        style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; color: #e6edf4; font-size: 1.05rem;">
                        <span class="icon" style="font-size: 1.3rem;">📞</span> +91 74881 2910
                    </div>
                    <div class="contact-item"
                        style="display: flex; align-items: center; justify-content: center; gap: 12px; color: #e6edf4; font-size: 1.05rem;">
                        <span class="icon" style="font-size: 1.3rem;">📍</span> Haridwar, Uttarakhand
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Popup Modal -->
    <div class="popup-overlay hidden" id="popupOverlay">
        <div class="popup-modal glass-panel">
            <button class="close-btn" id="closePopup">❌</button>
            <h2 class="popup-title">Welcome</h2>
            <p id="popupQuote" class="popup-quote"></p>
        </div>
    </div>

    <!-- Success Modal Overlay -->
    <div class="success-overlay hidden" id="successOverlay">
        <div class="success-modal glass-panel">
            <div class="success-icon">✔️</div>
            <h2 class="success-title">Thank You</h2>
            <p class="success-subtitle">Your feedback has been submitted successfully</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
